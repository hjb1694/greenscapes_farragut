<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greenscapes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/public/css/style.build.css" />
</head>
<body>
    <header class="header">
        <div class="header__container">
            <div class="header__part header__part--left">
                <img src="greenscapes_logo.png" class="header__logo" alt="logo" />
                <button class="nav-toggle">
                    <img src="/public/icons/menu_icon.svg" class="menu-icon" alt="menu icon" aria-label="navigation nav toggle" />
                </button>
            </div>
            <div class="header__part header__part--right">
                <button class="nav-close">
                    <img src="/public/icons/close_icon.svg" class="close-icon "alt="close icon" />
                </button>
                <nav class="nav">
                    <ul class="nav__list">
                        <li class="nav__item">
                            <a href="#">About</a>
                        </li>
                        <li class="nav__item">
                            <a href="#">Services</a>
                        </li>
                        <li class="nav__item">
                            <a href="#">Testimonials</a>
                        </li>
                        <li class="nav__item">
                            <a href="#">Portfolio</a>
                        </li>
                        <li class="nav__item">
                            <a href="#">Contact</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>
    <main>
        <section class="hero">
            <div class="slideshow uk-position-relative uk-visible-toggle uk-light" uk-slideshow="autoplay:true;animation:fade;max-height:725;ratio:16:9">
                <div class="slideshow__items uk-slideshow-items" uk-height-viewport="min:300">
                    <div class="slideshow__item uk-position-cover uk-animation-kenburns uk-animation-reverse uk-transform-origin-center-left">
                        <img class="slideshow-img" src="/landscape.jpeg" alt="Landscape" uk-cover>
                    </div>
                    <div class="slideshow__item uk-position-cover uk-animation-kenburns uk-animation-reverse uk-transform-origin-center-left">
                        <img class="slideshow-img" src="./gazebo.png" alt="Gazebo" uk-cover>
                    </div>
                    <div class="slideshow__item uk-position-cover uk-animation-kenburns uk-animation-reverse uk-transform-origin-center-left">
                        <img class="slideshow-img" src="/fence2.jpeg" alt="Fencd" uk-cover>
                    </div>
                </div>
                <a class="uk-position-absolute uk-position-center-left uk-position-small uk-hidden-hover" href uk-slidenav-previous uk-slideshow-item="previous"></a>
                <a class="uk-position-absolute uk-position-center-right uk-position-small uk-hidden-hover" href uk-slidenav-next uk-slideshow-item="next"></a>
            </div>
        </section>
        <section class="our-services">
            <h2 class="our-services__heading-text">Our Services</h2>
            <div class="container">
                <div class="our-services__service-tiles">
                    <div class="service-tile">
                        <img class="service-tile__img" src="/public/img/retaining_walls.png" alt="retaining wall"/>
                        <div class="service-tile__text">Retaining Walls</div>
                    </div>
                    <div class="service-tile">
                        <img class="service-tile__img" src="/public/img/flagstone_walkways.png" alt="Flagstone Walkways"/>
                        <div class="service-tile__text">Flagstone Walkways</div>
                    </div>
                    <div class="service-tile">
                        <img class="service-tile__img" src="public/img/ponds.png" alt="retaining wall"/>
                        <div class="service-tile__text">Ponds</div>
                    </div>
                    <div class="service-tile">
                        <img class="service-tile__img" src="public/img/outdoor_lighting.jpg" alt="outdoor lighting"/>
                        <div class="service-tile__text">Outdoor Lighting</div>
                    </div>
                    <div class="service-tile">
                        <img class="service-tile__img" src="/public/img/pond_waterfall.jpg" alt="waterfall"/>
                        <div class="service-tile__text">Waterfalls</div>
                    </div>
                    <div class="service-tile">
                        <img class="service-tile__img" src="/public/img/shrub.jpg" alt="waterfall"/>
                        <div class="service-tile__text">Shrubs + Foliage</div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer class="footer">
        <div class="footer__container">
            <img src="/public/img/greenscapes_logo.png" class="footer__logo" alt="footer logo" />
            <div class="footer__legal">
                <p class="footer__cr"><small>&copy;2026</small></p>
                <p class="made-with"><span>Made with</span> <img src="/public/icons/heart_icon.svg" alt="heart icon"/> by Hayden Bradfield</p>
            </div>
            <div class="footer__contact">
                <h3>Contact Us</h3>
                <div class="contact-item">
                    <img src="/public/icons/mail_yellow_icon.svg" alt="mail icon"/>
                    <span>info@greenscapesfarragut.com</span>
                </div>
                <div class="contact-item">
                    <img src="/public/icons/phone_yellow_icon.svg" alt="phone icon"/>
                    <span>(865) 000-0000</span>
                </div>
            </div>
        </div>
    </footer>
    <script src="/public/js/uikit.min.js"></script>
    <script>
        const navToggle = document.querySelector('.nav-toggle');
        const headerPartRight = document.querySelector('.header__part--right');
        const navClose = document.querySelector('.nav-close');

        navToggle.addEventListener('click', () => {
            headerPartRight.classList.add('show');
        });

        navClose.addEventListener('click', () => {
            headerPartRight.classList.remove('show');
        });

        alert("This is only a demo!");
    </script>
</body>
</html>
